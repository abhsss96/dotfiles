set-option -sa terminal-features ',xterm-256color:RGB'

set-option -g allow-rename off
# Set vi key bindings mode
set -g mode-keys vi
set -g status-keys vi
set-option -g set-clipboard on

# Set the prefix to Ctrl+a
set -g prefix C-a

# Remove the old prefix
unbind C-b

# Send Ctrl+a to applications by pressing it twice
bind C-a send-prefix


# Split windows using | and -
unbind '"'
unbind %
bind -n C-t new-window  -c "#{pane_current_path}"
bind v split-window -h  -c "#{pane_current_path}"
bind c split-window -v  -c "#{pane_current_path}"

# Windows management tmux 
set -g base-index 1       # Start numbering windows at 1, not 0.
set -g pane-base-index 1  # Start numbering panes at 1, not 0.
bind -n M-S-Down next-window
bind -n M-S-Up previous-window
bind -n C-S-Left swap-window -t -1\; select-window -t -1
bind -n C-S-Right swap-window -t +1\; select-window -t +1

# Smart pane switching with awareness of Vim splits.
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# /home/abhsss/.local/share/tmux/resurrect

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'alexanderjeurissen/tmux-world-clock'
# set -g @plugin 'christoomey/vim-tmux-navigator'

# Windows management tmux 
set -g base-index 1       # Start numbering windows at 1, not 0.
set -g pane-base-index 1  # Start numbering panes at 1, not 0.
bind -n C-t new-window
bind -n M-S-Down next-window
bind -n M-S-Up previous-window
bind -n C-S-Left swap-window -t -1\; select-window -t -1
bind -n C-S-Right swap-window -t +1\; select-window -t +1

# bind -n DoubleClick1Pane select-pane \; copy-mode -M \; send -X select-word \; send -X copy-pipe-no-clear "xsel -i"
# bind -T copy-mode    TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-no-clear "xsel -i"
# bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-no-clear "xsel -i"
# bind -n TripleClick1Pane select-pane \; copy-mode -M \; send -X select-line \; send -X copy-pipe-no-clear "xsel -i"

# bind -n MouseDown2Pane run "tmux set-buffer -b primary_selection \"$(xsel -o)\"; tmux paste-buffer -b primary_selection; tmux delete-buffer -b primary_selection"



# Config Dracula Theme
set -g @world_clock_tz 'America/Los_Angeles'
set -g @dracula-show-fahrenheit false
set -g @dracula-show-powerline true
set -g @dracula-show-network false
set -g @dracula-show-left-icon session
set -g @dracula-cpu-usage true
set -g @dracula-ram-usage true
set -g @dracula-day-month true
set -g @dracula-military-time true
set -g @dracula-show-flags true 
set -g @dracula-show-location false
set -g @yank_action 'copy-pipe-no-clear'
set -g @dracula-plugins 'weather ram-usage cpu-usage network-bandwidth battery network-ping time world_clock_status'


# Set 256 colors
set -s default-terminal 'screen-256color'
# set -s default-terminal 'tmux-256color'

bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"
# bind-key C-p choose-session -O name

# switch panes using Alt-arrow without prefix
# bind -n M-Left select-pane -L
# bind -n M-Right select-pane -R
# bind -n M-Up select-pane -U
# bind -n M-Down select-pane -D

# swap windows with shift+arrow with prefix
bind-key S-Left swap-window -t -1
bind-key S-Right swap-window -t +1

# better copy pasting 
bind -T copy-mode    C-c send -X copy-pipe-no-clear "xsel -i --clipboard"
bind -T copy-mode-vi C-c send -X copy-pipe-no-clear "xsel -i --clipboard"

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi r send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard"


bind -T copy-mode    DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-no-clear "xsel -i"
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-no-clear "xsel -i"


# copy from tmux to clipboard
bind-key -T copy-mode-vi Y send-keys -X copy-pipe "xclip -r" \; display-message "Copied to selection"
bind-key -T copy-mode-vi y send-keys -X copy-pipe "xclip -r -selection clipboard" \; display-message "Copied to clipboard"
# bind-key C-p run-shell "xclip -o | tmux load-buffer - && tmux paste-buffer"
bind-key -n M-v run "xclip -selection clipboard -o | tmux load-buffer - ; tmux paste-buffer"

#browser like searching 
bind -n C-M-f copy-mode \; command-prompt -i -p "(search up)" "send -X search-backward-incremental \"%%%\""
bind -T copy-mode-vi C-M-f copy-mode \; command-prompt -i -p "(search up)" "send -X search-backward-incremental \"%%%\""
bind -T copy-mode-vi C-g send -X search-again
bind -T copy-mode-vi C-M-g send -X search-reverse
bind -T copy-mode-vi C-h send -X search-reverse

# Smart pane switching with awareness of vim splits
# bind -n M-k run-shell 'tmux-vim-select-pane -U'
# bind -n M-j run-shell 'tmux-vim-select-pane -D'
# bind -n M-h run-shell 'tmux-vim-select-pane -L'
# bind -n M-l run-shell 'tmux-vim-select-pane -R'
# Mouse mode
set -g mouse on
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
# bind -n M-Left run "(tmux display-message -p '#{pane_title}' | grep -iqE 'vim|nvim' && tmux send-keys M-Left) || tmux select-pane -L"
# bind -n M-Down run "(tmux display-message -p '#{pane_title}' | grep -iqE 'vim|nvim' && tmux send-keys M-Down) || tmux select-pane -D"
# bind -n M-Up run "(tmux display-message -p '#{pane_title}' | grep -iqE 'vim|nvim' && tmux send-keys M-Up) || tmux select-pane -U"
# bind -n M-Right run "(tmux display-message -p '#{pane_title}' | grep -iqE 'vim|nvim' && tmux send-keys M-Right) || tmux select-pane -R"
bind-key -n M-Left if-shell "$is_vim" 'send-keys M-Left' 'select-pane -L'
bind-key -n M-Down if-shell "$is_vim" 'send-keys M-Down' 'select-pane -D'
bind-key -n M-Up if-shell "$is_vim" 'send-keys M-Up' 'select-pane -U'
bind-key -n M-Right if-shell "$is_vim" 'send-keys M-Right' 'select-pane -R'
# restore vim sessions
set -g @resurrect-strategy-vim 'session'
# restore neovim sessions
set -g @resurrect-strategy-nvim 'session'
# restore panes
set -g @resurrect-capture-pane-contents 'on'
# restore last saved environment (automatically)
set -g @continuum-restore 'on'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
# bind-key -T copy-mode-vi 'C-\' select-pane -lv
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
